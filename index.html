<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>MURGITOLA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <span id="backBtn" class="back-btn">←</span>
  <h1 id="homeBtn">MURGITOLA</h1>
</div>

<!-- Home Section -->
<div id="home" class="section active">
  <!-- Your Profile -->
  <div class="profile-card home-card" style="background: linear-gradient(135deg,#ff9a9e,#fad0c4);">
    <img src="mypic.jpg" alt="Saadman Rahim" class="profile-pic" id="openProfile">
    <h2 class="profile-name">Saadman Rahim</h2>
  </div>

  <!-- Friends horizontal -->
  <div class="friends-layout">
    <div class="friend-card" style="background: linear-gradient(135deg,#a1c4fd,#c2e9fb);">
      <img src="oindrila.jpg" onerror="this.src='placeholder.jpg'" alt="Oindrila" class="profile-pic friend-pic" data-name="Oindrila Sarkar Shithi" data-birth="07 January 2008" data-age="18" data-desc="Hi! I'm Oindrila, I love to chat and always full of energy. I'm playful and love to make friends smile.">
      <h3>Oindrila Sarkar Shithi</h3>
    </div>

    <div class="friend-card" style="background: linear-gradient(135deg,#fbc2eb,#a6c1ee);">
      <img src="shifaa.jpg" onerror="this.src='placeholder.jpg'" alt="Sirajum Munira Shefa" class="profile-pic friend-pic" data-name="Sirajum Munira Shefa" data-birth="28 November 2007" data-age="18" data-desc="Hey! I'm Munira. I love learning new things and talking about fun stories.">
      <h3>Sirajum Munira Shefa</h3>
    </div>

    <div class="friend-card" style="background: linear-gradient(135deg,#f6d365,#fda085);">
      <img src="sania.jpg" onerror="this.src='placeholder.jpg'" alt="Sania Rahman" class="profile-pic friend-pic" data-name="Sania Rahman" data-birth="17 January 2007" data-age="18" data-desc="Hello! I'm Sania. I enjoy reading and sharing my thoughts. Very friendly and cheerful.">
      <h3>Sania Rahman</h3>
    </div>

    <div class="friend-card" style="background: linear-gradient(135deg,#84fab0,#8fd3f4);">
      <img src="muntasir.jpg" onerror="this.src='placeholder.jpg'" alt="Muntasir Labib" class="profile-pic friend-pic" data-name="Muntasir Labib" data-birth="14 February 2008" data-age="18" data-desc="Hi, I'm Labib. I love jokes, chatting, and having fun with friends.">
      <h3>Muntasir Labib</h3>
    </div>

    <div class="friend-card" style="background: linear-gradient(135deg,#ffecd2,#fcb69f);">
      <img src="anjum.jpg" onerror="this.src='placeholder.jpg'" alt="Anjum Diya" class="profile-pic friend-pic" data-name="Anjum Diya" data-birth="" data-age="" data-desc="Hello! Anjum here. Profile info coming soon!">
      <h3>Anjum Diya</h3>
    </div>
  </div>
</div>

<!-- Profile Section -->
<div id="profile" class="section">
  <div class="profile-layout" id="profileLayout">
    <!-- Dynamic content -->
  </div>
</div>


<script src="script.js"></script>

<!-- Footer -->
<div class="footer">
  <span class="footer-logo">©</span>
  <span class="footer-text">Designed by Saadman</span>
</div>
