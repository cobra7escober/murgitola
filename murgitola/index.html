<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MURGITOLA</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <span id="backBtn" class="back-btn">←</span>
    <h1 id="homeBtn">MURGITOLA</h1>
  </div>

  <!-- Home Section -->
  <div id="home" class="section active">
    <!-- Your Profile -->
    <img src="mypic.jpg" alt="My Photo" class="profile-pic" id="openProfile">
    <h2>Saadman Rahim</h2>

    <!-- Friends Horizontal -->
    <div class="friends-layout">
      <div class="friend-card">
        <img src="oindrila.jpg" alt="Oindrila" class="profile-pic friend-pic" data-name="Oindrila ">
        <h3>Oindrila </h3>
      </div>
      <div class="friend-card">
        <img src="shifaa.jpg" alt="Shirajum Munira Shefa" class="profile-pic friend-pic" data-name="Shirajum Munira Shefa">
        <h3>Shirajum Munira Shefa</h3>
      </div>
      <div class="friend-card">
        <img src="sania.jpg" alt="Sania Rahman" class="profile-pic friend-pic" data-name="Sania Rahman">
        <h3>Sania Rahman</h3>
      </div>
      <div class="friend-card">
        <img src="muntasir.jpg" alt="Muntasir Labib" class="profile-pic friend-pic" data-name="Muntasir Labib">
        <h3>Muntasir Labib</h3>
      </div>
      <div class="friend-card">
        <img src="anjum.jpg" alt="Anjum Diya" class="profile-pic friend-pic" data-name="Anjum Diya">
        <h3>Anjum Diya</h3>
      </div>
    </div>
  </div>

  <!-- Profile Section -->
  <div id="profile" class="section">
    <div class="profile-layout">
      <div class="card" id="profileCard">
        <!-- Content will be dynamically generated -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
